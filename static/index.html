<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>企业文档问答系统</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #6c63ff;
      --accent-hover: #857dff;
      --text: #e8eaf0;
      --text-muted: #7b82a0;
      --green: #4ade80;
      --red: #f87171;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
    }

    header .logo {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    header h1 { font-size: 16px; font-weight: 600; }
    header span { color: var(--text-muted); font-size: 12px; margin-left: auto; }

    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 65px);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px;
      min-width: 300px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--surface);
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .upload-area {
      margin: 16px;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .upload-area:hover, .upload-area.drag { border-color: var(--accent); background: rgba(108,99,255,.06); }
    .upload-area .icon { font-size: 28px; margin-bottom: 8px; }
    .upload-area p { color: var(--text-muted); font-size: 12px; line-height: 1.6; }
    .upload-area strong { color: var(--text); }
    #file-input { display: none; }

    .upload-btn {
      display: block;
      margin: 0 16px 16px;
      padding: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .upload-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .upload-btn:disabled { opacity: .5; cursor: not-allowed; }

    .progress-wrap {
      margin: 0 16px 12px;
      display: none;
    }
    .progress-wrap.show { display: block; }
    .progress-filename {
      font-size: 11px; color: var(--text-muted);
      margin-bottom: 5px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .progress-bar-bg {
      height: 6px; border-radius: 3px;
      background: var(--surface2); overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; border-radius: 3px;
      background: var(--accent);
      width: 0%; transition: width .3s ease;
    }
    .progress-bar-fill.success { background: var(--green); }
    .progress-bar-fill.error { background: var(--red); }
    .progress-status {
      font-size: 11px; margin-top: 4px;
      color: var(--text-muted);
    }
    .progress-status.success { color: var(--green); }
    .progress-status.error { color: var(--red); }

    .doc-list { flex: 1; overflow-y: auto; padding: 0 16px 16px; }
    .doc-list-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 10px;
    }

    .doc-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--surface2);
      margin-bottom: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color .15s;
    }
    .doc-item:hover { border-color: var(--border); }
    .doc-item.selected { border-color: var(--accent); }

    .doc-icon {
      width: 32px; height: 32px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .doc-icon.pdf { background: rgba(248,113,113,.15); }
    .doc-icon.docx { background: rgba(74,222,128,.15); }
    .doc-icon.txt { background: rgba(108,99,255,.15); }

    .doc-info { flex: 1; min-width: 0; }
    .doc-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .doc-delete {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 4px;
      opacity: 0; transition: opacity .15s, color .15s;
    }
    .doc-item:hover .doc-delete { opacity: 1; }
    .doc-delete:hover { color: var(--red); }

    .empty-docs {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      padding: 24px 0;
    }

    /* ── Main Q&A area ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .welcome {
      margin: auto;
      text-align: center;
      max-width: 400px;
    }
    .welcome .big-icon { font-size: 48px; margin-bottom: 16px; }
    .welcome h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .welcome p { color: var(--text-muted); line-height: 1.6; }

    .message { display: flex; gap: 12px; max-width: 800px; }
    .message.user { flex-direction: row-reverse; margin-left: auto; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0; margin-top: 2px;
    }
    .avatar.user { background: var(--accent); }
    .avatar.ai { background: var(--surface2); border: 1px solid var(--border); }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.7;
      max-width: 660px;
    }
    .message.user .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.ai .bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .sources {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .sources-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; margin-bottom: 6px; }
    .source-chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 3px 10px;
      font-size: 11px; color: var(--text-muted);
      margin: 3px 3px 0 0; cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .source-chip:hover { border-color: var(--accent); color: var(--text); }

    .thinking {
      display: flex; align-items: center; gap: 8px;
      color: var(--text-muted); font-size: 13px;
    }
    .dots span {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--accent);
      animation: bounce .9s infinite;
    }
    .dots span:nth-child(2) { animation-delay: .15s; }
    .dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: .5; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input bar ── */
    .input-bar {
      padding: 16px 32px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .filter-bar {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px; flex-wrap: wrap;
    }
    .filter-label { font-size: 11px; color: var(--text-muted); }
    .filter-chip {
      padding: 3px 10px; border-radius: 20px;
      border: 1px solid var(--border); background: none;
      color: var(--text-muted); font-size: 11px; cursor: pointer;
      transition: all .15s;
    }
    .filter-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,.08); }
    .filter-chip:hover:not(.active) { border-color: var(--text-muted); color: var(--text); }

    .input-row {
      display: flex; gap: 10px; align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      padding: 12px 16px;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      line-height: 1.5;
      transition: border-color .2s;
      outline: none;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 48px; height: 48px; border-radius: 10px;
      background: var(--accent); border: none; color: #fff;
      font-size: 18px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .1s;
    }
    .send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .send-btn:active:not(:disabled) { transform: scale(.95); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 10px 20px; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      opacity: 0; pointer-events: none; transition: opacity .3s;
      z-index: 100;
    }
    #toast.show { opacity: 1; }
    #toast.success { background: rgba(74,222,128,.15); border: 1px solid var(--green); color: var(--green); }
    #toast.error { background: rgba(248,113,113,.15); border: 1px solid var(--red); color: var(--red); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Markdown rendering ── */
    .bubble.ai h1,.bubble.ai h2,.bubble.ai h3 { margin: 12px 0 6px; font-weight: 600; }
    .bubble.ai h1 { font-size: 16px; }
    .bubble.ai h2 { font-size: 15px; }
    .bubble.ai h3 { font-size: 14px; }
    .bubble.ai p { margin: 6px 0; }
    .bubble.ai ul,.bubble.ai ol { padding-left: 20px; margin: 6px 0; }
    .bubble.ai li { margin: 3px 0; }
    .bubble.ai code {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 5px;
      font-family: monospace; font-size: 12px;
    }
    .bubble.ai pre {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px; margin: 8px 0;
      overflow-x: auto;
    }
    .bubble.ai pre code { background: none; border: none; padding: 0; font-size: 12px; }
    .bubble.ai blockquote {
      border-left: 3px solid var(--accent); padding-left: 12px;
      color: var(--text-muted); margin: 8px 0;
    }
    .bubble.ai strong { font-weight: 600; color: var(--text); }
    .bubble.ai table { border-collapse: collapse; margin: 8px 0; width: 100%; font-size: 13px; }
    .bubble.ai th,.bubble.ai td { border: 1px solid var(--border); padding: 6px 10px; }
    .bubble.ai th { background: var(--surface); font-weight: 600; }
  </style>
</head>
<body>

<header>
  <div class="logo">📚</div>
  <h1>企业文档问答系统</h1>
  <span id="status-text">RAG · DeepSeek-R1</span>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">文档库</div>

    <div class="upload-area" id="drop-zone">
      <div class="icon">☁️</div>
      <p><strong>点击上传</strong>或拖拽文件到此处</p>
      <p style="margin-top:4px">支持 PDF、DOCX、TXT</p>
      <input type="file" id="file-input" accept=".pdf,.docx,.txt" multiple />
    </div>
    <button class="upload-btn" id="upload-btn" disabled>上传文档</button>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-filename" id="progress-filename"></div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-bar"></div>
      </div>
      <div class="progress-status" id="progress-status"></div>
    </div>

    <div class="doc-list">
      <div class="doc-list-label">已上传文档</div>
      <div id="doc-items"><div class="empty-docs">暂无文档，请上传</div></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="chat-area" id="chat-area">
      <div class="welcome" id="welcome">
        <div class="big-icon">🔍</div>
        <h2>开始提问</h2>
        <p>上传文档后，在下方输入问题，AI 将基于文档内容为你解答。</p>
      </div>
    </div>

    <div class="input-bar">
      <div class="filter-bar" id="filter-bar" style="display:none">
        <span class="filter-label">搜索范围：</span>
        <button class="filter-chip active" data-id="all" onclick="toggleFilter(this)">全部文档</button>
      </div>
      <div class="input-row">
        <textarea id="question-input" placeholder="输入你的问题…" rows="1"></textarea>
        <button class="send-btn" id="send-btn" disabled title="发送">➤</button>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  const API = '';
  marked.setOptions({ breaks: true, gfm: true });
  let documents = [];
  let selectedFiles = [];
  let isLoading = false;

  // ── Toast ──
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => t.className = '', 2500);
  }

  // ── Auto-resize textarea ──
  const textarea = document.getElementById('question-input');
  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 160) + 'px';
    updateSendBtn();
  });
  textarea.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
  });

  function updateSendBtn() {
    document.getElementById('send-btn').disabled = isLoading || !textarea.value.trim();
  }

  // ── File upload ──
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const uploadBtn = document.getElementById('upload-btn');

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag');
    handleFiles([...e.dataTransfer.files]);
  });
  fileInput.addEventListener('change', () => handleFiles([...fileInput.files]));

  function handleFiles(files) {
    selectedFiles = files.filter(f => /\.(pdf|docx|txt)$/i.test(f.name));
    if (!selectedFiles.length) { showToast('仅支持 PDF、DOCX、TXT 文件', 'error'); return; }
    dropZone.querySelector('p').innerHTML = `<strong>${selectedFiles.length} 个文件</strong> 已选择`;
    uploadBtn.disabled = false;
  }

  function setProgress(filename, pct, status, state) {
    const wrap = document.getElementById('progress-wrap');
    const bar = document.getElementById('progress-bar');
    const fn = document.getElementById('progress-filename');
    const st = document.getElementById('progress-status');
    wrap.classList.add('show');
    fn.textContent = filename;
    bar.style.width = pct + '%';
    bar.className = 'progress-bar-fill' + (state ? ' ' + state : '');
    st.textContent = status;
    st.className = 'progress-status' + (state ? ' ' + state : '');
  }

  function hideProgress() {
    setTimeout(() => {
      document.getElementById('progress-wrap').classList.remove('show');
      document.getElementById('progress-bar').style.width = '0%';
      document.getElementById('progress-bar').className = 'progress-bar-fill';
    }, 2000);
  }

  uploadBtn.addEventListener('click', async () => {
    if (!selectedFiles.length) return;
    uploadBtn.disabled = true;
    uploadBtn.textContent = '上传中…';
    let ok = 0;

    for (let i = 0; i < selectedFiles.length; i++) {
      const file = selectedFiles[i];
      const label = selectedFiles.length > 1
        ? `(${i + 1}/${selectedFiles.length}) ${file.name}`
        : file.name;

      setProgress(label, 20, '正在上传…', '');
      // animate to 70% while waiting
      setTimeout(() => {
        const bar = document.getElementById('progress-bar');
        if (bar.style.width === '20%') bar.style.width = '70%';
      }, 300);

      const fd = new FormData();
      fd.append('file', file);
      try {
        const r = await fetch(`${API}/api/documents/upload`, { method: 'POST', body: fd });
        if (r.ok) {
          const data = await r.json();
          ok++;
          setProgress(file.name, 100, `✓ 上传成功，共 ${data.total_chunks} 个块`, 'success');
        } else {
          const err = await r.json().catch(() => ({}));
          setProgress(file.name, 100, `✗ ${err.detail || '上传失败'}`, 'error');
        }
      } catch {
        setProgress(file.name, 100, '✗ 网络错误', 'error');
      }
    }

    selectedFiles = [];
    fileInput.value = '';
    dropZone.querySelector('p').innerHTML = '<strong>点击上传</strong>或拖拽文件到此处';
    uploadBtn.textContent = '上传文档';
    hideProgress();
    await loadDocuments();
  });

  // ── Documents ──
  async function loadDocuments() {
    try {
      const r = await fetch(`${API}/api/documents/`);
      documents = await r.json();
    } catch { documents = []; }
    renderDocuments();
    renderFilterChips();
  }

  function renderDocuments() {
    const container = document.getElementById('doc-items');
    if (!documents.length) {
      container.innerHTML = '<div class="empty-docs">暂无文档，请上传</div>';
      document.getElementById('send-btn').disabled = true;
      return;
    }
    document.getElementById('send-btn').disabled = isLoading || !textarea.value.trim();
    container.innerHTML = documents.map(d => {
      const ext = d.original_filename.split('.').pop().toLowerCase();
      const icons = { pdf: '📄', docx: '📝', txt: '📃' };
      const date = new Date(d.created_at).toLocaleDateString('zh-CN');
      return `
        <div class="doc-item" data-id="${d.id}">
          <div class="doc-icon ${ext}">${icons[ext] || '📄'}</div>
          <div class="doc-info">
            <div class="doc-name" title="${d.original_filename}">${d.original_filename}</div>
            <div class="doc-meta">${d.total_chunks} 个块 · ${date}</div>
          </div>
          <button class="doc-delete" onclick="deleteDoc(event,'${d.id}')">✕</button>
        </div>`;
    }).join('');
  }

  async function deleteDoc(e, id) {
    e.stopPropagation();
    try {
      await fetch(`${API}/api/documents/${id}`, { method: 'DELETE' });
      showToast('文档已删除');
      await loadDocuments();
    } catch { showToast('删除失败', 'error'); }
  }

  // ── Filter chips ──
  let selectedDocIds = [];

  function renderFilterChips() {
    const bar = document.getElementById('filter-bar');
    if (!documents.length) { bar.style.display = 'none'; return; }
    bar.style.display = 'flex';
    const existing = [...bar.querySelectorAll('[data-id]:not([data-id="all"])')];
    existing.forEach(el => el.remove());
    documents.forEach(d => {
      const btn = document.createElement('button');
      btn.className = 'filter-chip';
      btn.dataset.id = d.id;
      btn.textContent = d.original_filename.replace(/\.[^.]+$/, '');
      btn.onclick = () => toggleFilter(btn);
      bar.appendChild(btn);
    });
  }

  function toggleFilter(btn) {
    const id = btn.dataset.id;
    if (id === 'all') {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      selectedDocIds = [];
    } else {
      document.querySelector('[data-id="all"]').classList.remove('active');
      btn.classList.toggle('active');
      selectedDocIds = [...document.querySelectorAll('.filter-chip.active')].map(c => c.dataset.id);
      if (!selectedDocIds.length) {
        document.querySelector('[data-id="all"]').classList.add('active');
      }
    }
  }

  // ── Chat ──
  function appendMessage(role, content, sources = []) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const chat = document.getElementById('chat-area');
    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    const avatar = role === 'user' ? '👤' : '🤖';
    let sourcesHtml = '';
    if (sources.length) {
      const chips = sources.map(s =>
        `<span class="source-chip" title="${s.content_preview}">📎 ${s.filename}${s.page_number ? ' p.' + s.page_number : ''}</span>`
      ).join('');
      sourcesHtml = `<div class="sources"><div class="sources-label">引用来源</div>${chips}</div>`;
    }

    const contentHtml = role === 'ai'
      ? marked.parse(content)
      : escapeHtml(content);
    wrap.innerHTML = `
      <div class="avatar ${role}">${avatar}</div>
      <div class="bubble ${role}">${contentHtml}${sourcesHtml}</div>`;
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
  }

  function appendThinking() {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();
    const chat = document.getElementById('chat-area');
    const wrap = document.createElement('div');
    wrap.className = 'message ai';
    wrap.id = 'thinking-bubble';
    wrap.innerHTML = `
      <div class="avatar ai">🤖</div>
      <div class="bubble thinking">
        <span>正在思考</span>
        <div class="dots"><span></span><span></span><span></span></div>
      </div>`;
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeThinking() {
    document.getElementById('thinking-bubble')?.remove();
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  async function sendQuestion() {
    const q = textarea.value.trim();
    if (!q || isLoading || !documents.length) return;

    isLoading = true;
    updateSendBtn();
    textarea.value = '';
    textarea.style.height = 'auto';

    appendMessage('user', q);
    appendThinking();

    try {
      const body = { question: q };
      if (selectedDocIds.length) body.document_ids = selectedDocIds;

      const r = await fetch(`${API}/api/qa/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      removeThinking();

      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        appendMessage('ai', '请求失败：' + (err.detail || r.status));
      } else {
        const data = await r.json();
        appendMessage('ai', data.answer, data.sources || []);
      }
    } catch (e) {
      removeThinking();
      appendMessage('ai', '网络错误，请检查服务是否正常运行。');
    }

    isLoading = false;
    updateSendBtn();
  }

  document.getElementById('send-btn').addEventListener('click', sendQuestion);

  // ── Init ──
  loadDocuments();
</script>
</body>
</html>
